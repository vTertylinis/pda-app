<ion-header>
  <ion-toolbar>
    <ion-title>Tables</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="refresh()" aria-label="Refresh tables">
        <ion-icon name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="tablet">
  @if (activeTables.length > 0) {
    <!-- Tablet landscape: show cards in a 2-column grid for better use of 1280x800 -->
    <ion-grid class="table-grid" fixed>
      <ion-row>
        @for (table of activeTables; track table) {
          <ion-col size="3">
            <ion-card class="table-card">
              <ion-card-header>
                <div class="table-title">
                  <div class="table-name">
                    {{ getTableDisplayName(table) }}
                  </div>
                </div>
              </ion-card-header>
              <ion-card-content>
                <div class="actions">
                  <ion-button size="small" fill="outline" (click)="openTableModal(table)">
                    <ion-icon name="enter"></ion-icon>
                  </ion-button>
                  <ion-button size="small" color="danger" (click)="deleteItem(table)">
                    <ion-icon name="trash"></ion-icon>
                  </ion-button>
                </div>
              </ion-card-content>
            </ion-card>
          </ion-col>
        }
      </ion-row>
    </ion-grid>
  } @else {
    <div class="empty-state">
      <ion-text color="medium">
        <p>No tables with orders.</p>
      </ion-text>
    </div>
  }

</ion-content>
