<ion-header class="page-header">
  <ion-toolbar>
    <ion-title>
      Tables
      @if (activeTables.length > 0) {
        <span class="title-count">{{ activeTables.length }}</span>
      }
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="refresh()" aria-label="Refresh tables">
        <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="tablet">
  @if (activeTables.length > 0) {
    <div class="tables-grid">
      @for (table of activeTables; track table) {
        <article class="table-card"
                 [class.is-custom]="tableMetadata[table]?.isCustom"
                 (click)="openTableModal(table)">
          <header class="card-head">
            <h2 class="card-name" [title]="getTableDisplayName(table)">
              {{ getTableDisplayName(table) }}
            </h2>
            <div class="card-total">€{{ getTableTotal(table).toFixed(2) }}</div>
          </header>

          <footer class="card-actions">
            <button type="button"
                    class="act act-open"
                    (click)="openTableModal(table); $event.stopPropagation()">
              <ion-icon name="enter-outline"></ion-icon>
              <span>Open</span>
            </button>
            <button type="button"
                    class="act act-delete"
                    aria-label="Delete table"
                    (click)="deleteItem(table); $event.stopPropagation()">
              <ion-icon name="trash-outline"></ion-icon>
            </button>
          </footer>
        </article>
      }
    </div>
  } @else {
    <div class="empty-state">
      <ion-icon name="restaurant-outline"></ion-icon>
      <p>No tables with orders.</p>
    </div>
  }
</ion-content>
